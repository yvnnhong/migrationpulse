name: dbt CI

on:
  push:
    branches:
      - main

jobs:
  dbt-build:
    name: Run dbt models + tests
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          migrationpulse:
            outputs:
              dev:
                type: duckdb
                path: ':memory:'
                threads: 4
                extensions:
                  - httpfs
                  - delta
                settings:
                  s3_region: us-east-2
                  s3_access_key_id: "${{ secrets.AWS_ACCESS_KEY_ID }}"
                  s3_secret_access_key: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            target: dev
          EOF

      - name: Run dbt build (models + tests)
        working-directory: dbt_project/migrationpulse
        run: dbt build --select stg_movebank_sightings fct_species_movements rpt_corridor_deviation